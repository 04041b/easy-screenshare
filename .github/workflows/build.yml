name: build client

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# audiopus_sys (opus C source) ships an ancient CMakeLists.txt that runs
# `cmake_minimum_required(VERSION 2.x)` — CMake 4.x on current runners
# rejects that outright. Telling CMake to treat old policies as 3.5 is the
# documented escape hatch.
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) runners have been retired from the hosted pool; we
        # ship Apple Silicon only. Intel-Mac users can build from source.
        include:
          - label: macos-arm64
            os: macos-14
            ext: ""
          - label: windows-x64
            os: windows-latest
            ext: ".exe"

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Swatinem/rust-cache caches the cargo registry, git index, and
      # client/target/ — but cleverly: it scopes the target cache by
      # workspace member, prunes build artefacts for crates whose source
      # hasn't changed since the last cache save, and restores partially
      # when Cargo.lock changes. Net effect on this project: a pure-relink
      # build finishes in ~30s instead of compiling 600+ deps from scratch.
      - name: Cache cargo (Rust)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client
          shared-key: ${{ matrix.label }}
          cache-on-failure: true

      # ---------- macOS deps ----------
      - name: Install libvpx (macOS)
        if: runner.os == 'macOS'
        run: brew install libvpx pkg-config

      # Cache vcpkg's installed lib tree so the next Windows run skips the
      # ~3-minute `vcpkg install libvpx` step entirely. Key is bumped manually
      # if the libvpx version we depend on shifts.
      - name: Cache vcpkg libvpx (Windows)
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed/x64-windows-static-md
          key: vcpkg-libvpx-x64-windows-static-md-v1
          enableCrossOsArchive: false

      # ---------- Windows deps ----------
      # libvpx via vcpkg, then point env-libvpx-sys at it without pkg-config.
      # env-libvpx-sys insists VPX_VERSION accompany VPX_LIB_DIR so it can
      # pick the matching pre-generated bindings (or feed bindgen the right
      # version string).
      - name: Install libvpx (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # x64-windows-static-md = static libvpx.lib compiled against the
          # dynamic CRT (/MD). Matches Rust's default ABI and lets us produce
          # a single-binary release with libvpx baked in. The plain
          # x64-windows triplet would install vpx.dll + an import .lib,
          # which is incompatible with VPX_STATIC=1.
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static-md"
          if (Test-Path "$vcpkg/lib/vpx.lib") {
            Write-Host 'vcpkg cache hit - skipping vcpkg install libvpx'
          } else {
            vcpkg install libvpx:x64-windows-static-md
          }
          Write-Host "vcpkg lib dir contents:"
          Get-ChildItem "$vcpkg/lib" | Select-Object Name, Length
          # vcpkg names the static lib `vpx.lib`, but env-libvpx-sys emits
          # `cargo:rustc-link-lib=static=libvpx` on Windows (with the `lib`
          # prefix baked in). Rust's MSVC linker resolver doesn't try the
          # unprefixed form, so we mirror the file under both names.
          if (Test-Path "$vcpkg/lib/vpx.lib") {
            Copy-Item "$vcpkg/lib/vpx.lib" "$vcpkg/lib/libvpx.lib" -Force
            Write-Host "Mirrored vpx.lib -> libvpx.lib"
          }
          # Discover what vcpkg actually installed instead of hardcoding.
          $vpxVersion = (vcpkg list libvpx | Select-String -Pattern 'libvpx:x64-windows-static-md\s+(\S+)' | ForEach-Object { $_.Matches.Groups[1].Value }) -replace '#.*',''
          if (-not $vpxVersion) { $vpxVersion = "1.16.0" }
          echo "VPX_LIB_DIR=$vcpkg/lib"     | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "VPX_INCLUDE_DIR=$vcpkg/include" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "VPX_VERSION=$vpxVersion"    | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "VPX_NO_PKG_CONFIG=1"        | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          echo "VPX_STATIC=1"               | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # bindgen wants LIBCLANG_PATH. VS 2022 actually ships THREE copies
          # of libclang.dll under VC\Tools\Llvm\*:
          #   * \Llvm\bin\libclang.dll       — 32-bit (legacy)
          #   * \Llvm\x64\bin\libclang.dll   — 64-bit
          #   * \Llvm\ARM64\bin\libclang.dll — ARM64
          # We need the x64 one for an x64 build; bindgen rejects the others
          # with "invalid DLL (ARM64 / 32-bit)". Match the x64 path exactly.
          $candidates = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "libclang.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\Llvm\\x64\\bin\\' } |
            Select-Object -First 1
          $llvm = $candidates.DirectoryName
          if (-not $llvm) {
            # Fall back to chocolatey LLVM if VS doesn't ship an x64 libclang
            choco install llvm --no-progress -y
            $llvm = "C:\Program Files\LLVM\bin"
          }
          echo "LIBCLANG_PATH=$llvm" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using LIBCLANG_PATH=$llvm"

      - name: Build (release)
        run: cargo build --release

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp "target/release/screenshare${{ matrix.ext }}" "out/screenshare-${{ matrix.label }}${{ matrix.ext }}"
          ls -lh out/

      - name: Upload binary
        # archive: false (upload-artifact v7+) skips the default zip wrap so
        # downloaders get the raw executable directly — no unzip step before
        # `chmod +x && ./screenshare`. We only upload one file per job so
        # there's nothing the archive was buying us.
        uses: actions/upload-artifact@v7
        with:
          name: screenshare-${{ matrix.label }}
          path: client/out/screenshare-${{ matrix.label }}${{ matrix.ext }}
          archive: false
          if-no-files-found: error
          retention-days: 14
